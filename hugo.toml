baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'Evala'
theme = 'PaperMod'
copyright = '© Evala'

enableRobotsTXT = true
enableInlineShortcodes = true

[pagination]
pagerSize = 10

[outputs]
home = ['HTML', 'RSS', 'JSON']

[taxonomies]
category = 'categories'
tag = 'tags'
author = 'authors'
series = 'series'

[params]
env = 'production'
description = 'Minimal reporting on finance, government policy, and the everyday effects of public decisions.'
defaultTheme = 'auto'
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
ShowFullTextinRSS = true
UseHugoToc = true
comments = false
hideFooter = false

[params.homeInfoParams]
Title = 'Finance and policy, explained plainly.'
Content = 'Evala tracks public budgets, markets, regulation, taxes, labor, housing, and benefits through the question that matters most: what changes for regular people?'

